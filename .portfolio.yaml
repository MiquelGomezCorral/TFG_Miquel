title:
  en: "Visual Document Understanding (VDU): Azure OCR + DONUT for Information Extraction"
  es: "Extracción de Información de Documentos con VDU: Azure OCR + DONUT"
finished: finished
descriptionShort:
  en: Bachelor's thesis evaluating Visual Document Understanding methods for extracting structured information from documents. Compares Azure OCR + LLM, custom fine-tuned OCR, and DONUT (Document Understanding Transformer) with PyTorch Lightning. Deployed with Docker.
  es: Trabajo de Fin de Grado que evalúa métodos de Visual Document Understanding para extraer información estructurada de documentos. Compara OCR de Azure + LLM, fine-tuning de modelos OCR propios, y DONUT (Document Understanding Transformer) con PyTorch Lightning. Desplegado con Docker.
descriptionLong:
  en: |
    Bachelor's thesis addressing VDU (Visual Document Understanding): extracting structured data (JSON) from document images. Implements and compares three approaches: (1) Azure OCR + LLM pipeline for prompt-guided extraction, (2) fine-tuning of custom OCR models adapted to the specific task, and (3) DONUT (Document Understanding Transformer by Clova AI), an end-to-end encoder-decoder transformer that directly processes the document image and generates structured output. DONUT is trained with PyTorch Lightning, with custom tokenizer and image processor. Includes ground-truth validation, edit distance metrics, and sync scripts with private company repository. Full containerization with Docker Compose.
  es: |
    TFG que aborda el problema de VDU (Visual Document Understanding): extraer datos estructurados (JSON) a partir de imágenes de documentos. Implementa y compara tres enfoques: (1) pipeline OCR de Azure + LLM para extracción guiada por prompts, (2) fine-tuning de modelos OCR propios adaptados a la tarea específica, y (3) DONUT (Document Understanding Transformer de Clova AI), un modelo end-to-end basado en transformer encoder-decoder que procesa directamente la imagen del documento y genera la salida estructurada. DONUT se entrena con PyTorch Lightning, con tokenizador y procesador de imágenes personalizados. Incluye validación contra ground-truth, métricas de edición de distancia, y scripts de sincronización con repositorio privado de empresa. Contenerización completa con Docker Compose.
technologies: [python, pytorch, docker, huggingface, jupyter]
